<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q4 Drill 2</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Inter:wght@400;600&display=swap" rel="stylesheet">

   <style>
        body {
            background-image: url("https://i.pinimg.com/originals/21/f4/c7/21f4c752484ecfc057cd793f9758ed92.gif");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: Arial, Helvetica, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container-box {
            max-width: 420px;
            width: 90%;
            padding: 40px;
            background: rgba(109, 146, 193, 0.9); 
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            text-align: center;
            color: #e9e7dc; 
            margin-bottom: 25px;
            letter-spacing: 1px
        }

        details {
            background: rgba(255, 255, 255, 0.07);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-size: 0.85rem;
            cursor: pointer;
        }

        summary {
            font-weight: 600;
            color: #f8f7f6;
        }

        label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: #e0e0e0;
        }

        input.form-control {
            background-color: #ffffff !important;
            border: none;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 20px;
            color: #333;
        }

        .btn-check-heat {
            width: 100px;
            background-color: #d5dbf0;
            color: #1a1c1e;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            padding: 10px;
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn-check-heat:hover {
            background-color: #f3f3f9c5;
            transform: translateY(-2px);
        }

        #result {
            margin-top: 25px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 500;
            min-height: 50px;
        }
    </style>
</head>

<body>

    <div class="container-box">
        <h1>Heat Index Checker</h1>>

        <details ontoggle="showNote()">
            <summary>Note:</summary>
            <p class="mt-2 mb-0">Input the temperature (°C) and humidity (%), then click Check to see the heat index and its status.</p>
        </details>

        <label for="temp">Degree in °C</label>
        <input type="number" id="temp" class="form-control" placeholder="Input degree value">

        <label for="humidity">Humidity in %</label>
        <input type="number" id="humidity" class="form-control" placeholder="Input percentage value">

        <button class="btn-check-heat" onclick="checkHeat()">Check</button> 
        <p id="result"></p>
    </div>

    <script> 
        function showNote() {
            console.log("User toggled the instructions.");
        }

        function checkHeat() {
            let tempValue = document.getElementById("temp").value;
            let humidValue = document.getElementById("humidity").value;

            if (tempValue === "" || humidValue === "") {
                window.alert("Please provide both temperature and humidity!");
                return;
            }

            let temperature = Number(tempValue);
            let humidity = Number(humidValue);
            let heatIndex = temperature + (0.33 * humidity) - 4;
            let status;
            if (heatIndex <= 27) {
                status = "Comfortable / Cool";
            } 
            else if (heatIndex <= 32) {
                status = "Warm";
            } 
            else if (heatIndex <= 37) {
                status = "Hot";
            } 
            else if (heatIndex <= 41) {
                status = "Very Hot / Caution";
            } 
            else {
                status = "Extreme Heat / Danger";
            }
            window.alert("Heat Index: " + heatIndex.toFixed(1) + "°C\nStatus: " + status);

            document.getElementById("result").innerHTML = 
                "Feels like: <span style='color:#ffcc00;'>" + heatIndex.toFixed(1) + "°C</span><br>" +
                "<small>Status: " + status + "</small>";
        }
    </script>
</body>
</html>
